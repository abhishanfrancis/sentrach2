# ====================================================
# Tokenized Sentiment Oracle - Docker Compose
# Full production stack
# ====================================================

version: '3.9'

services:
  # ================================
  # BACKEND API
  # ================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sentiment-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/sentiment_oracle
      - REDIS_URL=redis://redis:6379/0
      - WEB3_PROVIDER_URL=${WEB3_PROVIDER_URL}
      - CONTRACT_ADDRESS=${CONTRACT_ADDRESS}
      - PRIVATE_KEY=${PRIVATE_KEY}
      - NEWS_API_KEY=${NEWS_API_KEY}
      - TWITTER_BEARER_TOKEN=${TWITTER_BEARER_TOKEN}
      - TWITTER_API_KEY=${TWITTER_API_KEY}
      - TWITTER_ENABLED=${TWITTER_ENABLED:-false}
      - ENABLE_API_KEYS=${ENABLE_API_KEYS:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - sentiment-network
    volumes:
      - backend-logs:/app/logs

  # ================================
  # FRONTEND DASHBOARD
  # ================================
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: sentiment-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NODE_ENV=production
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - sentiment-network

  # ================================
  # POSTGRESQL DATABASE
  # ================================
  postgres:
    image: postgres:16-alpine
    container_name: sentiment-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=sentiment_oracle
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-sentiment123}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentiment-network

  # ================================
  # REDIS CACHE
  # ================================
  redis:
    image: redis:7-alpine
    container_name: sentiment-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentiment-network

  # ================================
  # NGINX REVERSE PROXY (Optional)
  # ================================
  nginx:
    image: nginx:alpine
    container_name: sentiment-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - dashboard
    networks:
      - sentiment-network
    profiles:
      - production

# ================================
# NETWORKS
# ================================
networks:
  sentiment-network:
    driver: bridge

# ================================
# VOLUMES
# ================================
volumes:
  postgres-data:
  redis-data:
  backend-logs:
